<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Checkout - Zaplin</title>
  <link rel="icon" href="assets/img/zaplin-logo.png" type="image/png">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css?v=20260607-ui6">
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar"></aside>
    <div class="page-shell">
      <header class="topbar">
        <button class="icon-button mobile-menu" type="button" data-toggle-sidebar><span></span><span></span><span></span></button>
        <form class="searchbar" action="search.html" method="get"><input name="q" placeholder="Search by product name / brand / SKU" data-autocomplete autocomplete="off"><button>Search</button><div class="autocomplete" data-autocomplete-results hidden></div></form>
        <a class="cart-pill" href="cart.html">Cart <span data-cart-count>0</span></a>
      </header>
      <main class="main-content checkout-page">
        <section class="section-block checkout-card">
          <div class="account-title"><h1>Checkout</h1><p>Review delivery, GST and representative details before sending the order on WhatsApp.</p></div>
          <div class="checkout-section"><h2>Your Details</h2><div class="form-grid"><label>Shop / Owner Name<input data-checkout-name placeholder="e.g. Sharma Kirana Store"></label><label>Phone Number<input data-checkout-phone placeholder="10-digit mobile"></label></div></div>
          <div class="checkout-section"><h2>Delivery Address</h2><label class="wide-label">Full delivery address<textarea data-checkout-address rows="3" placeholder="Shop no, street, area, city, state, pincode"></textarea></label></div>
          <div class="checkout-section"><h2>Order Summary</h2><div class="summary-panel checkout-summary-panel" data-checkout-summary></div></div>
          <div class="checkout-section"><h2>Discount Coupon</h2><label>Coupon Code<input data-checkout-coupon placeholder="Enter discount coupon code (optional)"></label></div>
          <div class="checkout-section"><h2>Sales Representative</h2><label>Sales Representative Name<input data-checkout-sales-rep placeholder="Enter sales representative name (optional)"></label></div>
          <div class="checkout-section"><h2>GST Details</h2><label>GST Number (Optional)<input data-checkout-gst placeholder="Enter GST number (optional)"></label></div>
          <div class="checkout-section">
            <h2>Remarks</h2>
            <label>Remarks<input data-checkout-remarks placeholder="Enter any remarks or special instructions (optional)"></label>
          </div>
          <div class="checkout-section"><h2>Payment Method</h2><div class="payment-options">
            <label><input type="radio" name="payment" value="UPI"><span>UPI</span></label>
            <label><input type="radio" name="payment" value="Net Banking"><span>Net Banking</span></label>
            <label><input type="radio" name="payment" value="Card"><span>Card</span></label>
            <label><input type="radio" name="payment" value="Cash on Delivery" checked><span>Cash on Delivery</span></label>
            <label><input type="radio" name="payment" value="Credit Limit"><span>Credit Limit</span></label>
          </div></div>
          <button class="primary-action full checkout-submit whatsapp-submit" data-place-order><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20.5 3.5A11.7 11.7 0 0 0 12.1 0C5.6 0 .3 5.3.3 11.8c0 2.1.5 4.1 1.6 5.9L0 24l6.5-1.7a11.8 11.8 0 0 0 5.6 1.4h.1C18.7 23.7 24 18.4 24 11.9c0-3.2-1.2-6.1-3.5-8.4Zm-8.4 18.2h-.1a9.7 9.7 0 0 1-4.9-1.3l-.4-.2-3.9 1 1-3.8-.2-.4a9.7 9.7 0 1 1 8.5 4.7Zm5.3-7.3c-.3-.1-1.7-.8-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-.9 1.1-.2.2-.3.2-.6.1-1.7-.8-2.8-1.5-4-3.4-.3-.5.3-.5.8-1.5.1-.2 0-.4 0-.6l-.9-2.1c-.2-.5-.5-.5-.7-.5h-.6c-.2 0-.6.1-.9.4-.3.3-1.2 1.2-1.2 2.9s1.3 3.4 1.4 3.6c.2.2 2.5 3.8 6 5.3.8.4 1.5.6 2 .7.8.3 1.6.2 2.2.1.7-.1 1.7-.7 1.9-1.4.2-.7.2-1.3.2-1.4-.1-.2-.3-.3-.6-.4Z"/></svg><span>Place Order on WhatsApp</span></button>
          <p data-order-confirmation hidden></p>
        </section>
      </main>
    </div>
  </div>
  <script src="assets/js/products.js?v=20260607-ui6"></script>
  <script src="assets/js/firebase-config.js?v=20260611"></script>
  <script type="module" src="assets/js/firebase-data.js?v=20260611"></script>
  <script src="assets/js/app.js?v=20260611" defer></script>
</body>
</html>
